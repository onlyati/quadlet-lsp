name: Go CI
on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "**"
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/**"
      - ".markdownlint.json"
      - ".gitignore"
      - ".prettierrc"
      - "LICENSE"
      - "Makefile"
      - ".goreleaser.yaml"
      - "mise.toml"
      - "*.spec"
      - "*.yaml"
permissions:
  contents: read
jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: 1.26
      - name: Run Unit Tests
        run: go test ./... -v
  lint:
    name: Check linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: 1.26
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
  build:
    name: Cross-Platform Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: 1.26
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean --skip=publish --skip=validate --snapshot
